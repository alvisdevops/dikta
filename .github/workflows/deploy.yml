name: Deploy to alvis-server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secrets
        run: |
          cat > .env << EOF
          NODE_ENV=production
          APP_PORT=3007
          PROJECT_NAME=dikta

          POSTGRES_PORT=5436
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}

          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
          EOF
          echo "✅ Archivo .env creado"

      - name: Deploy with Docker Compose
        run: |
          echo "🚀 Starting deployment..."
          docker compose down || true

          echo "📦 Building images..."
          docker compose build app
          docker compose --profile tools build migrator

          echo "🚀 Starting database..."
          docker compose up -d db
          sleep 5

          echo "🔄 Running database migrations..."
          docker compose --profile tools run --rm migrator npx prisma migrate deploy
          echo "✅ Migrations completed"

          echo "🚀 Starting app..."
          docker compose up -d app

          echo ""
          echo "📊 Container Status:"
          docker compose ps
          echo ""

      - name: Health check
        run: |
          echo "⏳ Waiting for services..."
          for i in {1..15}; do
            if curl -sf http://localhost:3007/api/health > /dev/null; then
              echo "✅ App is healthy"
              exit 0
            fi
            echo "Waiting... ($i/15)"
            sleep 3
          done
          echo "⚠️ Health check timed out"
          docker compose logs app --tail=20
          exit 1
